<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam - School Exam Platform</title>
</head>
<body>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(to bottom, #22C55E, #07110C);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: linear-gradient(to right, #333333, #000000);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            color: #fff;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #22C55E;
            padding-bottom: 20px;
        }

        .header h1 {
            color: #22C55E;
            margin-bottom: 10px;
        }

        .student-info {
            background: rgba(34, 197, 94, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 15px;
        }

        .info-item {
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border-left: 3px solid #22C55E;
        }

        .info-label {
            color: #22C55E;
            font-weight: 600;
            font-size: 12px;
        }

        .info-value {
            color: #fff;
            font-size: 13px;
            margin-top: 5px;
        }

        .exam-container {
            background: rgba(34, 197, 94, 0.1);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .question-header {
            background: rgba(34, 197, 94, 0.2);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .question-number {
            color: #22C55E;
            font-weight: 600;
            font-size: 14px;
        }

        .question-text {
            color: #fff;
            font-size: 20px;
            margin-top: 12px;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(34, 197, 94, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s ease;
            font-size: 16px;
            color: #fff;
            font-weight: 500;
        }

        .option:hover {
            background: rgba(34, 197, 94, 0.2);
            border-color: #22C55E;
            transform: translateX(5px);
        }

        .option.selected {
            background: #22C55E;
            border-color: #22C55E;
            color: #000;
            font-weight: 600;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
        }

        .nav-btn {
            padding: 12px 25px;
            background: #555;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .nav-btn:hover:not(:disabled) {
            background: #666;
            transform: translateY(-2px);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .submit-btn {
            padding: 12px 30px;
            background: #22C55E;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
            font-size: 16px;
        }

        .submit-btn:hover {
            background: #1ca34a;
            transform: translateY(-2px);
        }

        .question-counter {
            text-align: center;
            color: #22C55E;
            font-weight: 600;
        }

        .timer {
            text-align: right;
            color: #22C55E;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .progress {
            background: rgba(255, 255, 255, 0.1);
            height: 8px;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            background: #22C55E;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .score-display {
            background: rgba(34, 197, 94, 0.2);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            margin-top: 30px;
            display: none;
        }

        .score-display.show {
            display: block;
        }

        .score-display h2 {
            color: #22C55E;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .score-display .score-value {
            font-size: 48px;
            color: #22C55E;
            font-weight: bold;
            margin: 20px 0;
        }

        .score-display .score-percentage {
            font-size: 24px;
            color: #bbb;
            margin-bottom: 20px;
        }

        .score-display .back-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: #22C55E;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s ease;
        }

        .score-display .back-btn:hover {
            background: #1ca34a;
        }

        .keyboard-hint {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
            color: #bbb;
            text-align: center;
            margin-top: 15px;
        }

        .header h1 {
            color: #22C55E;
            margin-bottom: 10px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .header-top h1 {
            margin: 0;
        }

        .settings-link {
            color: #22C55E;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            padding: 8px 15px;
            background: rgba(34, 197, 94, 0.2);
            border-radius: 6px;
            border: 1px solid #22C55E;
            transition: 0.3s ease;
        }

        .settings-link:hover {
            background: rgba(34, 197, 94, 0.3);
        }

    </style>

    <div class="container">
        <div class="header">
            <div class="header-top">
                <h1>📝 Exam</h1>
                <a href="teacher.html" class="settings-link">⚙️ Settings</a>
            </div>
            <div class="timer">Time: <span id="timer">30:00</span></div>
        </div>

        <!-- Student Info -->
        <div class="student-info">
            <div class="info-item">
                <div class="info-label">Student Name</div>
                <div class="info-value" id="studentName">-</div>
            </div>
            <div class="info-item">
                <div class="info-label">Age</div>
                <div class="info-value" id="studentAge">-</div>
            </div>
            <div class="info-item">
                <div class="info-label">Class</div>
                <div class="info-value" id="studentClass">-</div>
            </div>
            <div class="info-item">
                <div class="info-label">Subject</div>
                <div class="info-value" id="studentSubject">-</div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Exam Content -->
        <div id="examContent">
            <div class="exam-container">
                <div class="question-header">
                    <div class="question-number">Question <span id="currentQuestion">1</span> of <span id="totalQuestions">3</span></div>
                    <div class="question-text" id="questionText">What is the capital of India?</div>
                </div>

                <div class="options" id="optionsContainer">
                    <div class="option" data-option="a" onclick="selectOption(this)">A) Mumbai</div>
                    <div class="option" data-option="b" onclick="selectOption(this)">B) New Delhi</div>
                    <div class="option" data-option="c" onclick="selectOption(this)">C) Bangalore</div>
                    <div class="option" data-option="d" onclick="selectOption(this)">D) Kolkata</div>
                </div>

                <div class="navigation">
                    <button class="nav-btn" id="prevBtn" onclick="previousQuestion()" disabled>← Previous</button>
                    <div class="question-counter"><span id="qCounter">1/3</span></div>
                    <button class="nav-btn" id="nextBtn" onclick="nextQuestion()">Next →</button>
                </div>

                <div class="navigation" style="justify-content: center;">
                    <button class="submit-btn" onclick="submitExam()">SUBMIT EXAM (Press S)</button>
                </div>

                <div class="keyboard-hint">
                    💡 Click A, B, C, D to select | Press N for Next | Press S to Submit
                </div>
            </div>
        </div>

        <!-- Score Display -->
        <div id="scoreDisplay" class="score-display">
            <h2>✅ Exam Finished!</h2>
            <div class="score-value" id="scoreValue">0/3</div>
            <div class="score-percentage" id="scorePercentage">0%</div>
            
            <div style="background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 8px; margin: 20px 0; max-height: 400px; overflow-y: auto;">
                <h3 style="color: #22C55E; margin-bottom: 15px;">Answer Review</h3>
                <div id="answersReview"></div>
            </div>
            
            <button class="back-btn" onclick="goBack()">Back to Login</button>
        </div>
    </div>

    <script>
        let currentQuestionIndex = 0;
        let answers = [];
        const defaultQuestions = [
            {
                question: "What is the capital of India?",
                options: ["Mumbai", "New Delhi", "Bangalore", "Kolkata"],
                correct: "b"
            },
            {
                question: "What is 15 × 12?",
                options: ["160", "180", "200", "220"],
                correct: "b"
            },
            {
                question: "Who wrote the Indian National Anthem?",
                options: ["Rabindranath Tagore", "Mahatma Gandhi", "Jawaharlal Nehru", "Subhas Chandra Bose"],
                correct: "a"
            }
        ];

        let questions = [];

        // Load student info
        window.addEventListener('load', function() {
            const studentInfo = localStorage.getItem('studentInfo');
            if (studentInfo) {
                const data = JSON.parse(studentInfo);
                document.getElementById('studentName').textContent = data.name;
                document.getElementById('studentAge').textContent = data.age;
                document.getElementById('studentClass').textContent = data.class;
                document.getElementById('studentSubject').textContent = data.subject;
            } else {
                window.location.href = 'index.html';
            }

            // Load questions from teacher settings or use defaults
            const customQuestions = JSON.parse(localStorage.getItem('examQuestions'));
            if (customQuestions && customQuestions.length > 0) {
                questions = customQuestions;
            } else {
                questions = defaultQuestions;
            }

            document.getElementById('totalQuestions').textContent = questions.length;
            document.getElementById('qCounter').textContent = '1/' + questions.length;
            answers = new Array(questions.length).fill(null);
            
            displayQuestion();
            startTimer();
        });

        // Timer functionality
        let timeLeft = 30 * 60;
        function startTimer() {
            // Display initial time immediately
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            document.getElementById('timer').textContent = 
                (minutes < 10 ? '0' : '') + minutes + ':' + 
                (seconds < 10 ? '0' : '') + seconds;
            
            // Start countdown
            setInterval(function() {
                if (timeLeft > 0) {
                    timeLeft--;
                    let minutes = Math.floor(timeLeft / 60);
                    let seconds = timeLeft % 60;
                    document.getElementById('timer').textContent = 
                        (minutes < 10 ? '0' : '') + minutes + ':' + 
                        (seconds < 10 ? '0' : '') + seconds;
                    
                    let progress = ((30 * 60 - timeLeft) / (30 * 60)) * 100;
                    document.getElementById('progressBar').style.width = progress + '%';
                }
            }, 1000);
        }

        function displayQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            document.getElementById('questionText').textContent = q.question || q.text;
            document.getElementById('qCounter').textContent = (currentQuestionIndex + 1) + '/' + questions.length;

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            const optionLetters = ['A', 'B', 'C', 'D'];
            (q.options || Object.values(q.options)).forEach((option, index) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.setAttribute('data-option', String.fromCharCode(97 + index));
                div.textContent = optionLetters[index] + ') ' + option;
                div.onclick = function() { selectOption(this); };

                if (answers[currentQuestionIndex] === String.fromCharCode(97 + index)) {
                    div.classList.add('selected');
                }

                optionsContainer.appendChild(div);
            });

            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            document.getElementById('nextBtn').textContent = currentQuestionIndex === questions.length - 1 ? 'Review' : 'Next →';

            updateProgressBar();
        }

        function selectOption(element) {
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            answers[currentQuestionIndex] = element.getAttribute('data-option');
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                displayQuestion();
            }
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuestion();
            }
        }

        function updateProgressBar() {
            const answered = answers.filter(a => a !== null).length;
            const percentage = (answered / questions.length) * 100;
            document.getElementById('progressBar').style.width = percentage + '%';
        }

        function submitExam() {
            let score = 0;
            questions.forEach((q, index) => {
                if (answers[index] === (q.correct || q.correct)) {
                    score++;
                }
            });

            const results = {
                studentName: document.getElementById('studentName').textContent,
                subject: document.getElementById('studentSubject').textContent,
                totalQuestions: questions.length,
                correctAnswers: score,
                percentage: (score / questions.length) * 100,
                submittedAt: new Date().toLocaleString()
            };

            localStorage.setItem('examResults', JSON.stringify(results));

            // Create answer review
            let reviewHTML = '';
            const optionLetters = ['A', 'B', 'C', 'D'];
            questions.forEach((q, index) => {
                const qNum = index + 1;
                const userAnswer = answers[index].toUpperCase();
                const correctAnswer = (q.correct || q.correct).toUpperCase();
                const isCorrect = answers[index] === (q.correct || q.correct);
                
                const userAnswerText = (q.options || Object.values(q.options))[answers[index].charCodeAt(0) - 97];
                const correctAnswerText = (q.options || Object.values(q.options))[correctAnswer.charCodeAt(0) - 97];
                
                reviewHTML += `
                    <div style="background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid ${isCorrect ? '#22C55E' : '#ef4444'};">
                        <p style="color: #fff; font-weight: 600; margin-bottom: 10px;">Q${qNum}) ${q.question || q.text}</p>
                        <p style="color: ${isCorrect ? '#22C55E' : '#ef4444'}; margin: 5px 0;">✓ Your Answer: <strong>${userAnswer}) ${userAnswerText}</strong></p>
                        ${!isCorrect ? `<p style="color: #22C55E; margin: 5px 0;">✓ Correct Answer: <strong>${correctAnswer}) ${correctAnswerText}</strong></p>` : ''}
                    </div>
                `;
            });

            document.getElementById('answersReview').innerHTML = reviewHTML;

            document.getElementById('examContent').style.display = 'none';
            document.getElementById('scoreDisplay').classList.add('show');
            document.getElementById('scoreValue').textContent = score + '/' + questions.length;
            document.getElementById('scorePercentage').textContent = ((score / questions.length) * 100).toFixed(1) + '%';
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            const key = e.key.toLowerCase();
            
            if (key === 'a' || key === 'b' || key === 'c' || key === 'd') {
                const options = document.querySelectorAll('.option');
                options.forEach(opt => {
                    if (opt.getAttribute('data-option') === key) {
                        selectOption(opt);
                    }
                });
            }

            if (key === 'n') {
                nextQuestion();
            }

            if (key === 'p') {
                previousQuestion();
            }

            if (key === 's') {
                submitExam();
            }
        });
    </script>

</body>
</html>
